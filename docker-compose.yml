services:
  pickrr:
    build: .
    container_name: pickrr
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-pickrr}
      POSTGRES_USER: ${POSTGRES_USER:-pickrr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pickrr}
    networks:
      - dokploy-network
  postgres:
    image: postgres:16-alpine
    container_name: pickrr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pickrr}
      POSTGRES_USER: ${POSTGRES_USER:-pickrr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pickrr}
    volumes:
      - /opt/pickrr/postgres:/var/lib/postgresql/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
